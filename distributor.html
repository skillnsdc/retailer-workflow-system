<!DOCTYPE html>
<html>

<head>

<title>Distributor Approval</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding-top:100px;
}

.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
font-size:16px;
}

.approve{
background:green;
}

.reject{
background:red;
}

</style>

</head>

<body>

<div class="box">

<h2>Distributor Approval</h2>

<p>New Account Opening Request</p>

<button class="approve" onclick="approve()">
Approve
</button>

<button class="reject" onclick="reject()">
Reject
</button>

</div>

<script>

function approve(){

localStorage.setItem("application_status","approved");

alert("Application Approved");

window.location.href="success.html";

}

function reject(){

localStorage.setItem("application_status","rejected");

alert("Application Rejected");

window.location.href="dashboard.html";

}

</script>

</body>

</html>
