<!DOCTYPE html>
<html>

<head>
<title>Fingerprint Capture</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding-top:120px;
}

.box{
background:white;
width:420px;
margin:auto;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:12px 25px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#status{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Fingerprint Authentication</h2>

<p>Connect MFS110 Device</p>

<button onclick="captureFingerprint()">Capture Fingerprint</button>

<p id="status"></p>

</div>

<script>

function captureFingerprint(){

document.getElementById("status").innerHTML="Connecting RD Service...";

var pidOptions = `
<PidOptions>
<Opts fCount="1" fType="2" format="0" pidVer="2.0" timeout="20000"/>
</PidOptions>
`;

fetch("http://127.0.0.1:11100/capture",{

method:"POST",
body:pidOptions

})

.then(response => response.text())

.then(data => {

console.log(data);

document.getElementById("status").innerHTML="Fingerprint Captured Successfully";

setTimeout(function(){

window.location.href="success.html";

},2000);

})

.catch(error => {

document.getElementById("status").innerHTML="Device not connected";

});

}

</script>

</body>

</html>
