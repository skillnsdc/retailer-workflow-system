<!DOCTYPE html>
<html>

<head>

<title>Retailer Portal</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
margin-top:120px;
}

input,select{
width:300px;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
padding:10px 25px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<div class="container">

<h2>Retailer Portal</h2>

<h3>Open New IPPB Account</h3>

<input type="text" id="mobile" placeholder="Customer Mobile Number">

<br><br>

<select id="product">

<option value="">Select Product</option>
<option>Regular Savings Account</option>
<option>Mandate Account</option>
<option>Pension Savings Account</option>

</select>

<br><br>

<button onclick="sendWorkflow()">Continue</button>

</div>

<script>

function sendWorkflow(){

var mobile=document.getElementById("mobile").value;
var product=document.getElementById("product").value;

if(mobile==""){
alert("Enter Mobile Number");
return;
}

if(product==""){
alert("Select Product");
return;
}

alert("Workflow Sent to Workforce Successfully");

}

</script>

</body>

</html>
