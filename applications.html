<!DOCTYPE html>
<html>

<head>
<title>Distributor Applications</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
text-align:center;
}

table{
width:80%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#007bff;
color:white;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
color:white;
cursor:pointer;
}

.approve{
background:green;
}

.reject{
background:red;
}

</style>

</head>

<body>

<h2>Pending Account Applications</h2>

<table>

<tr>
<th>Application ID</th>
<th>Customer Mobile</th>
<th>Status</th>
<th>Action</th>
</tr>

<tbody id="appList"></tbody>

</table>

<script>

let applications = JSON.parse(localStorage.getItem("applications")) || [];

function loadApps(){

let table = document.getElementById("appList");

table.innerHTML="";

applications.forEach((app,index)=>{

let row = table.insertRow();

row.insertCell(0).innerHTML = app.id;
row.insertCell(1).innerHTML = app.mobile;
row.insertCell(2).innerHTML = app.status;

row.insertCell(3).innerHTML =
"<button class='approve' onclick='approve("+index+")'>Approve</button> " +
"<button class='reject' onclick='reject("+index+")'>Reject</button>";

});

}

function approve(i){

applications[i].status="Approved";

localStorage.setItem("applications",JSON.stringify(applications));

loadApps();

alert("Application Approved");

}

function reject(i){

applications[i].status="Rejected";

localStorage.setItem("applications",JSON.stringify(applications));

loadApps();

alert("Application Rejected");

}

loadApps();

</script>

</body>

</html>
