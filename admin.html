<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.login-box{
margin-top:150px;
}

input{
padding:12px;
margin:10px;
width:250px;
}

button{
padding:12px 30px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<br>

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>

<script>

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234")
{
alert("Login Successful");
}
else
{
alert("Invalid Login");
}

}

</script>

</body>
</html>
