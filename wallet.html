<!DOCTYPE html>
<html>

<head>
<title>Retailer Wallet</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding-top:80px;
}

.box{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.balance{
font-size:28px;
color:green;
margin:20px 0;
}

button{
padding:10px 20px;
margin:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#007bff;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>Retailer Wallet</h2>

<div class="balance" id="balance">
Balance : ₹100
</div>

<button onclick="addMoney()">Add ₹50</button>
<button onclick="deductMoney()">Account Opening (-₹20)</button>

<table>

<tr>
<th>Date</th>
<th>Service</th>
<th>Amount</th>
</tr>

<tbody id="history"></tbody>

</table>

<br>

<button onclick="window.location.href='dashboard.html'">
Back to Dashboard
</button>

</div>

<script>

let balance = 100;

function addMoney(){

balance = balance + 50;

document.getElementById("balance").innerHTML =
"Balance : ₹" + balance;

addHistory("Wallet Topup","+50");

}

function deductMoney(){

balance = balance - 20;

document.getElementById("balance").innerHTML =
"Balance : ₹" + balance;

addHistory("Account Opening","-20");

}

function addHistory(service,amount){

let table = document.getElementById("history");

let row = table.insertRow();

let date = new Date().toLocaleDateString();

row.insertCell(0).innerHTML = date;
row.insertCell(1).innerHTML = service;
row.insertCell(2).innerHTML = amount;

}

</script>

</body>

</html>
